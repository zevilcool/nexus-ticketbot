version: "3.9"
services:
  bot:
    build: .
    container_name: nexus-bot
    restart: unless-stopped
    env_file: .env
    volumes:
      - bot_data:/app/data
      - bot_logs:/app/logs
    environment:
      - NODE_ENV=production
      - DATABASE_URL=file:/app/data/prod.db
    command: >
      sh -c "npx prisma migrate deploy && node src/index.js"
volumes:
  bot_data:
  bot_logs:
